[env:esp8266_4m]
platform = espressif8266@4.2.1
board = esp12e
framework = arduino
board_build.flash_mode = dout
board_build.f_cpu = 80000000L
upload_protocol = esptool
upload_port = COM18
upload_speed = 115200
monitor_port = COM18
monitor_speed = 115200
lib_deps =
    links2004/WebSockets@2.6.1
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
